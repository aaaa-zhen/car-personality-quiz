<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>测测你适合开什么车</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ===== 开始页 ===== -->
  <div class="page start-page active" id="page-start">
    <div class="start-particles" id="particles"></div>
    <div class="hero-visual">
      <div class="start-logo">
        <svg viewBox="0 0 90 90" fill="none">
          <circle class="logo-ring-outer" cx="45" cy="45" r="42" stroke="rgba(99,102,241,0.2)" stroke-width="0.8" stroke-dasharray="4 6"/>
          <circle cx="45" cy="45" r="34" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
          <circle cx="45" cy="45" r="24" stroke="rgba(99,102,241,0.15)" stroke-width="0.5"/>
          <path d="M30 45 L45 30 L60 45 L45 60 Z" stroke="rgba(99,102,241,0.55)" stroke-width="1.2" fill="rgba(99,102,241,0.06)"/>
          <circle cx="45" cy="45" r="4" fill="rgba(99,102,241,0.4)"/>
          <circle cx="45" cy="45" r="1.5" fill="rgba(99,102,241,0.65)"/>
        </svg>
      </div>
    </div>

    <div class="start-content">
      <div class="start-divider"></div>
      <h1 class="start-title">测测你适合开什么车</h1>
      <p class="start-desc">17 道精选问题，解码你的用车人格<br>10 维画像 × 年龄性别适配 × 25 款车型精准匹配</p>
      <div class="start-pills">
        <div class="start-pill">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 2a15 15 0 014 10 15 15 0 01-4 10 15 15 0 01-4-10A15 15 0 0112 2z"/></svg>
          <span>10维画像</span>
        </div>
        <div class="start-pill">
          <svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
          <span>场景化测试</span>
        </div>
        <div class="start-pill">
          <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
          <span>精准匹配</span>
        </div>
      </div>
      <button class="btn-start" onclick="startQuiz()">
        开始测试
        <svg viewBox="0 0 24 24"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg>
      </button>
      <div class="start-meta">17 道题 · 约 3 分钟</div>
    </div>
  </div>

  <!-- ===== 题目页 ===== -->
  <div class="page question-page" id="page-question">
    <div class="q-particles" id="q-particles"></div>
    <div class="q-top">
      <button class="q-back" onclick="goBack()">
        <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <div class="q-step"><b id="q-num">1</b> / <span id="q-total">17</span></div>
      <div class="q-spacer"></div>
    </div>
    <div class="q-progress">
      <div class="q-progress-track">
        <div class="q-progress-fill" id="progress"></div>
      </div>
    </div>
    <div class="q-body">
      <div class="q-section-tag" id="q-tag" style="display:none;"></div>
      <div class="q-text" id="q-text"></div>
      <div class="q-options" id="q-options"></div>
    </div>
  </div>

  <!-- ===== 加载页 ===== -->
  <div class="page loading-page" id="page-loading">
    <div class="loader">
      <div class="loader-ring"></div>
      <div class="loader-arc"></div>
      <div class="loader-dot"></div>
    </div>
    <div class="loader-text">正在分析你的用车人格...</div>
    <div class="loader-sub">匹配人格画像与车型数据库</div>
  </div>

  <!-- ===== 结果页 ===== -->
  <div class="page result-page" id="page-result">
    <div class="r-label">你的测试结果</div>
    <div class="r-card">
      <div class="r-brand-logo" id="r-brand-logo"></div>
      <div class="r-icon-wrap" id="r-icon"></div>
      <div class="r-type" id="r-type"></div>
      <div class="r-car" id="r-car"></div>
      <div class="r-brand" id="r-brand"></div>
      <div class="r-specs">
        <div class="r-spec">
          <div class="r-spec-val" id="r-price"></div>
          <div class="r-spec-lbl">参考价格</div>
        </div>
        <div class="r-spec">
          <div class="r-spec-val" id="r-power"></div>
          <div class="r-spec-lbl">动力类型</div>
        </div>
        <div class="r-spec">
          <div class="r-spec-val" id="r-match"></div>
          <div class="r-spec-lbl">匹配度</div>
        </div>
      </div>
      <div class="r-slogan" id="r-slogan"></div>
      <div class="r-portrait" id="r-portrait"></div>
      <div class="r-desc" id="r-desc"></div>
      <div class="r-tags" id="r-tags"></div>
    </div>
    <div class="r-more-section">
      <div class="r-more-title" id="r-more-title">同类型也适合你</div>
      <div class="r-more-list" id="r-more"></div>
    </div>
    <button class="btn-again" onclick="restart()">重新测试</button>
  </div>

  <script src="app.js"></script>

</body>
</html>
